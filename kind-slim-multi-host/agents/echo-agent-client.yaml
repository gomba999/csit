#
# Echo A2A agent client (slimrpc) for cluster-b. Connects to local Slim dataplane
# with SPIRE (TLS + workload identity), mirroring
# deployments/client_apps/with_spire/sender.yaml.
# https://github.com/agntcy/slim-a2a-python/tree/main/examples/echo_agent
#
# PyPI: slima2a — installed at container start; pin with SLIMA2A_VERSION.
# Deploy: task -d deployments/multicluster_private echo-agent:client:deploy
apiVersion: v1
kind: ServiceAccount
metadata:
  name: echo-agent-client
  labels:
    app.kubernetes.io/name: echo-agent-client
    app.kubernetes.io/component: echo-agent-client
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: echo-agent-client
  labels:
    app.kubernetes.io/name: echo-agent-client
    app.kubernetes.io/component: echo-agent-client
spec:
  className: spire-spire
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - echo-agent-client
  workloadSelectorTemplates:
    - k8s:sa:echo-agent-client
  spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/ns/default/sa/echo-agent-client"
  federatesWith:
    - cluster-a.example
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-agent-client-script
  labels:
    app.kubernetes.io/name: echo-agent-client
data:
  echo_client.py: |
    # Copyright AGNTCY Contributors (https://github.com/agntcy)
    # SPDX-License-Identifier: Apache-2.0
    """Echo A2A client over slimrpc."""
    from __future__ import annotations

    import asyncio
    import logging
    import os
    import sys

    import httpx
    import slim_bindings
    from a2a.client import ClientFactory, create_text_message_object, minimal_agent_card
    from a2a.types.a2a_pb2 import SendMessageRequest

    from slima2a import initialize_slim_service
    from slima2a.client_transport import ClientConfig, slimrpc_channel_factory
    from slima2a.client_transport import SRPCTransport

    logger = logging.getLogger(__name__)


    def _env(name: str, default: str) -> str:
        v = os.environ.get(name)
        return v if v is not None and v != "" else default


    async def send_message(client, text: str) -> str:
        message = create_text_message_object(content=text)
        request = SendMessageRequest(message=message)
        output = ""
        try:
            async for stream_response, task in client.send_message(request=request):
                which = stream_response.WhichOneof("payload")
                if which == "message":
                    for part in stream_response.message.parts:
                        if part.WhichOneof("content") == "text":
                            output += part.text
                elif which == "task":
                    if task:
                        logger.info("task (%s) status: %s", task.id, task.status.state)
                    if task and task.artifacts:
                        for artifact in task.artifacts:
                            for part in artifact.parts:
                                if part.WhichOneof("content") == "text":
                                    output += part.text
                elif which == "artifact_update":
                    artifact = stream_response.artifact_update.artifact
                    for part in artifact.parts:
                        if part.WhichOneof("content") == "text":
                            output += part.text
        except Exception as e:
            logger.error("send_message failed: %s", e, exc_info=True)
            raise RuntimeError("failed sending message or processing response") from e
        return output


    async def main() -> None:
        log_level = getattr(logging, _env("SLIM_LOG_LEVEL", "INFO").upper(), logging.INFO)
        logging.basicConfig(level=log_level)

        slim_url = _env("SLIM_URL", "https://slim.slim.svc.cluster.local:46357")
        slim_cfg_path = _env("SLIM_CLIENT_CONFIG", "")
        ns = _env("SLIM_NAME_NAMESPACE", "agntcy")
        group = _env("SLIM_NAME_GROUP", "demo")
        client_name = _env("SLIM_CLIENT_LOCAL_NAME", "client")
        secret = _env("SLIM_APP_SECRET", "my_shared_secret_for_testing_purposes_only")
        remote = _env("ECHO_REMOTE_AGENT", "agntcy/demo/echo_agent")
        text = _env("ECHO_CLIENT_TEXT", "hi from cluster-b")
        socket_path = _env("SPIRE_SOCKET_PATH", "")
        jwt_audience_raw = _env("SPIRE_JWT_AUDIENCE", "")

        stream = _env("ECHO_CLIENT_STREAM", "false").lower() in ("1", "true", "yes")

        slim_log = "debug" if log_level <= logging.DEBUG else "info"
        service = await initialize_slim_service(log_level=slim_log)
        local_name = slim_bindings.Name(ns, group, client_name)

        if slim_cfg_path:
            with open(slim_cfg_path, encoding="utf-8") as f:
                client_grpc_config = slim_bindings.new_config_from_json(f.read())
        else:
            client_grpc_config = slim_bindings.new_insecure_client_config(slim_url)
        conn_id = await service.connect_async(client_grpc_config)

        if socket_path:
            audiences = [a.strip() for a in jwt_audience_raw.split(",") if a.strip()]
            spire_cfg = slim_bindings.SpireConfig(
                trust_domains=[],
                socket_path=socket_path,
                target_spiffe_id=None,
                jwt_audiences=audiences,
            )
            provider = slim_bindings.IdentityProviderConfig.SPIRE(config=spire_cfg)
            verifier = slim_bindings.IdentityVerifierConfig.SPIRE(config=spire_cfg)
            slim_local_app = service.create_app(local_name, provider, verifier)
        else:
            slim_local_app = service.create_app_with_secret(local_name, secret)

        await slim_local_app.subscribe_async(local_name, conn_id)

        async with httpx.AsyncClient() as httpx_client:
            client_config = ClientConfig(
                supported_protocol_bindings=["slimrpc"],
                streaming=stream,
                httpx_client=httpx_client,
                slimrpc_channel_factory=slimrpc_channel_factory(slim_local_app, conn_id),
            )
            client_factory = ClientFactory(client_config)
            client_factory.register("slimrpc", SRPCTransport.create)  # type: ignore[arg-type]

            agent_card = minimal_agent_card(remote, ["slimrpc"])
            client = client_factory.create(card=agent_card)
            logger.info("A2A client initialized; sending: %s", text)
            response_text = await send_message(client, text)
            print(f"> {text}", file=sys.stderr)
            print(response_text, file=sys.stderr)


    if __name__ == "__main__":
        asyncio.run(main())
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-agent-client
  labels:
    app.kubernetes.io/name: echo-agent-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-agent-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-agent-client
        app.kubernetes.io/component: echo-agent-client
    spec:
      serviceAccountName: echo-agent-client
      containers:
        - name: echo-agent-client
          image: docker.io/library/python:3.12-slim-bookworm
          imagePullPolicy: IfNotPresent
          env:
            - name: SLIMA2A_VERSION
              value: "0.4.0"
            - name: SLIM_URL
              value: "http://agntcy-cluster-b-slim:46357"
            - name: SPIRE_SOCKET_PATH
              value: "unix:/tmp/spire-agent/public/api.sock"
            - name: SPIRE_JWT_AUDIENCE
              value: "slim-demo"
            - name: SLIM_LOG_LEVEL
              value: "INFO"
            - name: ECHO_CLIENT_TEXT
              value: "hi, this is a text message from cluster-b"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              python -m pip install --no-cache-dir --upgrade packaging "slima2a==${SLIMA2A_VERSION}"
              while true; do
                python -u /scripts/echo_client.py || true
                sleep 30
              done
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: spire-agent-socket
              mountPath: /tmp/spire-agent/public/
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: scripts
          configMap:
            name: echo-agent-client-script
            defaultMode: 0444
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/agent-sockets
            type: Directory
