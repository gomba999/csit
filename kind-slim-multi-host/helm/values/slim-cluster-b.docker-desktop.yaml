#
# Fallback overlay when slim pods on B cannot route to the cloud-provider-kind LoadBalancer IP.
# Prefer the default slim-cluster-b.yaml (ingress LB + CoreDNS alias on B).
# Merge with slim-cluster-b.yaml, e.g.:
#   helm upgrade ... -f helm/values/slim-cluster-b.yaml -f helm/values/slim-cluster-b.docker-desktop.yaml
#
# Targets host-published ingress (:10080); tls insecure aligns with plaintext HTTP/2 to nginx.
slim:
  overrideConfig:
    services:
      slim/0:
        controller:
          clients:
            - endpoint: "host.docker.internal:10080"
              tls:
                insecure: true
