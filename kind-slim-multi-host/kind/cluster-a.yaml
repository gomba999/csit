# KinD cluster A (csit-a) with host port maps for ingress-nginx (optional loopback 10080/10443).
# Cross-cluster controller reachability uses ingress LoadBalancer (cloud-provider-kind); see README.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: csit-a
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 10080
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: 10443
        listenAddress: "127.0.0.1"
        protocol: TCP
