# KinD cluster B (csit-b) with host port maps 9080/9443 → node :80/:443 (no ingress-nginx on B).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: csit-b
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 9080
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: 9443
        listenAddress: "127.0.0.1"
        protocol: TCP
