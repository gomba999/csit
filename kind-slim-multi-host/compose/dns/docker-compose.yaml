#
# Host-local DNS publishes a high port (default 8053 → container 53). Avoids:
# - privileged 53 and Docker/macOS bind failures
# - 5353 (often mDNSResponder / Bonjour on macOS)
# Set CSIT_LOCAL_DNS_HOST_PORT when running docker compose / Task; resolver `port` must match.
services:
  local-dns:
    image: docker.io/coredns/coredns:1.11.3
    container_name: kind-slim-multi-host-local-dns
    restart: unless-stopped
    ports:
      - "${CSIT_LOCAL_DNS_HOST_PORT:-8053}:53/tcp"
      - "${CSIT_LOCAL_DNS_HOST_PORT:-8053}:53/udp"
    volumes:
      - type: bind
        source: ./Corefile
        target: /etc/coredns/Corefile
        read_only: true
      - type: bind
        source: ./csittest.zone
        target: /etc/coredns/csittest.zone
        read_only: true
    command: ["-conf", "/etc/coredns/Corefile"]
