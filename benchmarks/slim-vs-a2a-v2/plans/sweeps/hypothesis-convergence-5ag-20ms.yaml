apiVersion: bench.agntcy.io/v2
kind: ConsensusScenario
metadata:
    name: hypothesis-convergence-5agents-20ms
    domain: hypothesis-convergence
    description: Generated consensus scenario for transport sweeps
spec:
    agents: 5
    thinkTimeMs: 20
    findingEmitDelayMs: 2
    maxRounds: 200
    targetMode: majority
    seed: 42
    valueSpace: 3
agents:
    - id: agent-0
      slimName: agntcy/bench-v2/agent-0
      a2aPort: 9700
      role: coordinator
    - id: agent-1
      slimName: agntcy/bench-v2/agent-1
      a2aPort: 9711
      role: worker
    - id: agent-2
      slimName: agntcy/bench-v2/agent-2
      a2aPort: 9722
      role: worker
    - id: agent-3
      slimName: agntcy/bench-v2/agent-3
      a2aPort: 9733
      role: worker
    - id: agent-4
      slimName: agntcy/bench-v2/agent-4
      a2aPort: 9744
      role: worker
