      a2aPort: 9744
      role: worker
    - id: agent-5
      slimName: agntcy/bench-v2/agent-5
      a2aPort: 9755
      role: worker
    - id: agent-6
      slimName: agntcy/bench-v2/agent-6
      a2aPort: 9766
      role: worker
    - id: agent-7
      slimName: agntcy/bench-v2/agent-7
