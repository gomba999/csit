---
version: '3'

silent: true

vars:
  G_BEHAVIOR_LABELS:
    map:
      core: behavior-core
      task-streaming: behavior-task-streaming
      lifecycle: behavior-lifecycle
      push-config: behavior-push-config
      parity: behavior-parity

tasks:
  deps:update:
    desc: Update all SDK dependencies to their latest versions
    cmds:
      - task: deps:update:go
      - task: deps:update:rust
      - task: deps:update:python
      - task: deps:update:dotnet

  deps:update:go:
    desc: Update Go SDK to latest version
    cmds:
      - go get github.com/a2aproject/a2a-go/v2@latest
    status:
      - '! command -v go'

  deps:update:rust:
    desc: Update Rust SDK crates to latest versions
    dir: fixtures/rust
    cmds:
      - cargo update
    status:
      - '! command -v cargo'

  deps:update:python:
    desc: Update Python SDK to latest compatible version
    dir: fixtures/python
    cmds:
      - uv lock --upgrade
    status:
      - '! command -v uv'

  deps:update:dotnet:
    desc: Update .NET SDK packages to latest versions
    dir: fixtures/dotnet
    cmds:
      - dotnet nuget locals http-cache --clear
      - cd InteropServer && dotnet add package A2A.AspNetCore --prerelease
      - cd InteropProbe && dotnet add package A2A --prerelease
    status:
      - '! command -v dotnet'

  test:
    desc: Default A2A interoperability tests
    cmds:
      - task: test:self-go
        ignore_error: true
      - task: test:self-rust
        ignore_error: true
      - task: test:self-python
        ignore_error: true
      - task: test:self-dotnet
        ignore_error: true
      - task: test:rust-go
        ignore_error: true
      - task: test:rust-dotnet
        ignore_error: true
      - task: test:go-dotnet
        ignore_error: true
      - task: test:python-go
        ignore_error: true
      - task: test:rust-python
        ignore_error: true
      - task: test:python-dotnet
        ignore_error: true

  reports:dashboard:
    desc: Render the A2A HTML dashboard from the reports directory
    cmds:
      - mkdir -p ./reports
      - go run ./tools/report_dashboard.go --reports-dir ./reports --output ./reports/index.html

  test:rust-go:
    desc: Rust and Go interoperability test matrix across JSON-RPC, HTTP+JSON, and gRPC
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go
          REPORT_NAME: report-agntcy-a2a

  test:rust-dotnet:
    desc: Rust and .NET interoperability test matrix for the current JSON-RPC and HTTP+JSON slices
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet

  test:go-dotnet:
    desc: Go and .NET interoperability test matrix for the current JSON-RPC and HTTP+JSON slices
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-go-dotnet
          REPORT_NAME: report-agntcy-a2a-go-dotnet

  test:python-go:
    desc: Python v1.0 and Go interoperability test matrix across JSON-RPC, HTTP+JSON, and gRPC
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-python-go
          REPORT_NAME: report-agntcy-a2a-python-go

  test:rust-python:
    desc: Rust and Python v1.0 interoperability test matrix across JSON-RPC, HTTP+JSON, and gRPC
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-python
          REPORT_NAME: report-agntcy-a2a-rust-python

  test:python-dotnet:
    desc: Python v1.0 and .NET interoperability test matrix for the current JSON-RPC and HTTP+JSON slices
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-python-dotnet
          REPORT_NAME: report-agntcy-a2a-python-dotnet

  test:self:
    desc: Self-compatibility tests for all SDKs (Go, Rust, Python, .NET)
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: 'suite-self-go || suite-self-rust || suite-self-python || suite-self-dotnet'
          REPORT_NAME: report-agntcy-a2a-self

  test:self-go:
    desc: Go self-compatibility test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-self-go
          REPORT_NAME: report-agntcy-a2a-self-go

  test:self-rust:
    desc: Rust self-compatibility test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-self-rust
          REPORT_NAME: report-agntcy-a2a-self-rust

  test:self-python:
    desc: Python self-compatibility test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-self-python
          REPORT_NAME: report-agntcy-a2a-self-python

  test:self-dotnet:
    desc: .NET self-compatibility test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-self-dotnet
          REPORT_NAME: report-agntcy-a2a-self-dotnet

  'test:behavior:*':
    desc: Shared behavior slice task. Use test:behavior:<core|task-streaming|lifecycle|push-config|parity>.
    vars:
      BEHAVIOR: '{{index .MATCH 0}}'
      LABEL_FILTER: '{{index .G_BEHAVIOR_LABELS .BEHAVIOR}}'
      REPORT_NAME: 'report-agntcy-a2a-behavior-{{.BEHAVIOR}}'
    preconditions:
      - sh: 'case "{{.BEHAVIOR}}" in core|task-streaming|lifecycle|push-config|parity) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported shared behavior "{{.BEHAVIOR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-go:behavior:*':
    desc: Rust and Go behavior slice task. Use test:rust-go:behavior:<core|task-streaming|lifecycle|push-config|parity>.
    vars:
      BEHAVIOR: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-rust-go && {{index .G_BEHAVIOR_LABELS .BEHAVIOR}}'
      REPORT_NAME: 'report-agntcy-a2a-rust-go-behavior-{{.BEHAVIOR}}'
    preconditions:
      - sh: 'case "{{.BEHAVIOR}}" in core|task-streaming|lifecycle|push-config|parity) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Go behavior "{{.BEHAVIOR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-dotnet:behavior:*':
    desc: Rust and .NET behavior slice task. Use test:rust-dotnet:behavior:<core|task-streaming|lifecycle|push-config|parity>.
    vars:
      BEHAVIOR: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-rust-dotnet && {{index .G_BEHAVIOR_LABELS .BEHAVIOR}}'
      REPORT_NAME: 'report-agntcy-a2a-rust-dotnet-behavior-{{.BEHAVIOR}}'
    preconditions:
      - sh: 'case "{{.BEHAVIOR}}" in core|task-streaming|lifecycle|push-config|parity) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and .NET behavior "{{.BEHAVIOR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:go-dotnet:behavior:*':
    desc: Go and .NET behavior slice task. Use test:go-dotnet:behavior:<core|task-streaming|lifecycle|push-config|parity>.
    vars:
      BEHAVIOR: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-go-dotnet && {{index .G_BEHAVIOR_LABELS .BEHAVIOR}}'
      REPORT_NAME: 'report-agntcy-a2a-go-dotnet-behavior-{{.BEHAVIOR}}'
    preconditions:
      - sh: 'case "{{.BEHAVIOR}}" in core|task-streaming|lifecycle|push-config|parity) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Go and .NET behavior "{{.BEHAVIOR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:python-go:behavior:*':
    desc: Python and Go behavior slice task. Use test:python-go:behavior:<core|task-streaming|lifecycle|push-config|parity>.
    vars:
      BEHAVIOR: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-python-go && {{index .G_BEHAVIOR_LABELS .BEHAVIOR}}'
      REPORT_NAME: 'report-agntcy-a2a-python-go-behavior-{{.BEHAVIOR}}'
    preconditions:
      - sh: 'case "{{.BEHAVIOR}}" in core|task-streaming|lifecycle|push-config|parity) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and Go behavior "{{.BEHAVIOR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-python:behavior:*':
    desc: Rust and Python behavior slice task. Use test:rust-python:behavior:<core|task-streaming|lifecycle|push-config|parity>.
    vars:
      BEHAVIOR: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-rust-python && {{index .G_BEHAVIOR_LABELS .BEHAVIOR}}'
      REPORT_NAME: 'report-agntcy-a2a-rust-python-behavior-{{.BEHAVIOR}}'
    preconditions:
      - sh: 'case "{{.BEHAVIOR}}" in core|task-streaming|lifecycle|push-config|parity) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Python behavior "{{.BEHAVIOR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:python-dotnet:behavior:*':
    desc: Python and .NET behavior slice task. Use test:python-dotnet:behavior:<core|task-streaming|lifecycle|push-config|parity>.
    vars:
      BEHAVIOR: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-python-dotnet && {{index .G_BEHAVIOR_LABELS .BEHAVIOR}}'
      REPORT_NAME: 'report-agntcy-a2a-python-dotnet-behavior-{{.BEHAVIOR}}'
    preconditions:
      - sh: 'case "{{.BEHAVIOR}}" in core|task-streaming|lifecycle|push-config|parity) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and .NET behavior "{{.BEHAVIOR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-go:*:*':
    desc: Rust and Go per-case task. Use test:rust-go:<jsonrpc|rest|grpc>:<go-go|go-rust|rust-go|rust-rust>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      PAIR: '{{index .MATCH 1}}'
      LABEL_FILTER: 'suite-rust-go && {{.TRANSPORT}} && {{.PAIR}}'
      REPORT_NAME: '{{if eq .TRANSPORT "jsonrpc"}}report-agntcy-a2a-{{.PAIR}}{{else if eq .TRANSPORT "rest"}}report-agntcy-a2a-rest-{{.PAIR}}{{else if eq .TRANSPORT "grpc"}}report-agntcy-a2a-grpc-{{.PAIR}}{{end}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest|grpc) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Go transport "{{.TRANSPORT}}".'
      - sh: 'case "{{.PAIR}}" in go-go|go-rust|rust-go|rust-rust) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Go pair "{{.PAIR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-dotnet:*:*':
    desc: Rust and .NET per-case task. Use test:rust-dotnet:<jsonrpc|rest>:<dotnet-dotnet|dotnet-rust|rust-dotnet|rust-rust-dotnet>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      PAIR: '{{index .MATCH 1}}'
      LABEL_FILTER: 'suite-rust-dotnet && {{.TRANSPORT}} && {{.PAIR}}'
      REPORT_NAME: '{{if eq .TRANSPORT "jsonrpc"}}report-agntcy-a2a-rust-dotnet-{{.PAIR}}{{else if eq .TRANSPORT "rest"}}report-agntcy-a2a-rust-dotnet-rest-{{.PAIR}}{{end}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and .NET transport "{{.TRANSPORT}}".'
      - sh: 'case "{{.PAIR}}" in dotnet-dotnet|dotnet-rust|rust-dotnet|rust-rust-dotnet) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and .NET pair "{{.PAIR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  test:rust-dotnet:jsonrpc:rust-rust:
    desc: Alias for test:rust-dotnet:jsonrpc:rust-rust-dotnet
    cmds:
      - task: test:rust-dotnet:jsonrpc:rust-rust-dotnet

  test:rust-dotnet:rest:rust-rust:
    desc: Alias for test:rust-dotnet:rest:rust-rust-dotnet
    cmds:
      - task: test:rust-dotnet:rest:rust-rust-dotnet

  'test:go-dotnet:*:*':
    desc: Go and .NET per-case task. Use test:go-dotnet:<jsonrpc|rest>:<go-go|go-dotnet|dotnet-go|dotnet-dotnet>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      PAIR: '{{index .MATCH 1}}'
      LABEL_FILTER: 'suite-go-dotnet && {{.TRANSPORT}} && {{.PAIR}}'
      REPORT_NAME: 'report-agntcy-a2a-go-dotnet-{{.TRANSPORT}}-{{.PAIR}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Go and .NET transport "{{.TRANSPORT}}".'
      - sh: 'case "{{.PAIR}}" in go-go|go-dotnet|dotnet-go|dotnet-dotnet) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Go and .NET pair "{{.PAIR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:python-go:*:*':
    desc: Python and Go per-case task. Use test:python-go:<jsonrpc|rest|grpc>:<go-go|go-python|python-go|python-python>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      PAIR: '{{index .MATCH 1}}'
      LABEL_FILTER: 'suite-python-go && {{.TRANSPORT}} && {{.PAIR}}'
      REPORT_NAME: 'report-agntcy-a2a-python-go-{{.TRANSPORT}}-{{.PAIR}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest|grpc) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and Go transport "{{.TRANSPORT}}".'
      - sh: 'case "{{.PAIR}}" in go-go|go-python|python-go|python-python) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and Go pair "{{.PAIR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-python:*:*':
    desc: Rust and Python per-case task. Use test:rust-python:<jsonrpc|rest|grpc>:<rust-rust|rust-python|python-rust|python-python>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      PAIR: '{{index .MATCH 1}}'
      LABEL_FILTER: 'suite-rust-python && {{.TRANSPORT}} && {{.PAIR}}'
      REPORT_NAME: 'report-agntcy-a2a-rust-python-{{.TRANSPORT}}-{{.PAIR}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest|grpc) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Python transport "{{.TRANSPORT}}".'
      - sh: 'case "{{.PAIR}}" in rust-rust|rust-python|python-rust|python-python) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Python pair "{{.PAIR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:python-dotnet:*:*':
    desc: Python and .NET per-case task. Use test:python-dotnet:<jsonrpc|rest>:<python-python|python-dotnet|dotnet-python|dotnet-dotnet>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      PAIR: '{{index .MATCH 1}}'
      LABEL_FILTER: 'suite-python-dotnet && {{.TRANSPORT}} && {{.PAIR}}'
      REPORT_NAME: 'report-agntcy-a2a-python-dotnet-{{.TRANSPORT}}-{{.PAIR}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and .NET transport "{{.TRANSPORT}}".'
      - sh: 'case "{{.PAIR}}" in python-python|python-dotnet|dotnet-python|dotnet-dotnet) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and .NET pair "{{.PAIR}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-go:*':
    desc: Rust and Go transport task. Use test:rust-go:<jsonrpc|rest|grpc>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-rust-go && {{.TRANSPORT}}'
      REPORT_NAME: '{{if eq .TRANSPORT "jsonrpc"}}report-agntcy-a2a-jsonrpc{{else if eq .TRANSPORT "rest"}}report-agntcy-a2a-rest{{else if eq .TRANSPORT "grpc"}}report-agntcy-a2a-grpc{{end}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest|grpc) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Go transport "{{.TRANSPORT}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-dotnet:*':
    desc: Rust and .NET transport task. Use test:rust-dotnet:<jsonrpc|rest>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-rust-dotnet && {{.TRANSPORT}}'
      REPORT_NAME: 'report-agntcy-a2a-rust-dotnet-{{.TRANSPORT}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and .NET transport "{{.TRANSPORT}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:go-dotnet:*':
    desc: Go and .NET transport task. Use test:go-dotnet:<jsonrpc|rest>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-go-dotnet && {{.TRANSPORT}}'
      REPORT_NAME: 'report-agntcy-a2a-go-dotnet-{{.TRANSPORT}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Go and .NET transport "{{.TRANSPORT}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:python-go:*':
    desc: Python and Go transport task. Use test:python-go:<jsonrpc|rest|grpc>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-python-go && {{.TRANSPORT}}'
      REPORT_NAME: 'report-agntcy-a2a-python-go-{{.TRANSPORT}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest|grpc) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and Go transport "{{.TRANSPORT}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:rust-python:*':
    desc: Rust and Python transport task. Use test:rust-python:<jsonrpc|rest|grpc>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-rust-python && {{.TRANSPORT}}'
      REPORT_NAME: 'report-agntcy-a2a-rust-python-{{.TRANSPORT}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest|grpc) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Rust and Python transport "{{.TRANSPORT}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  'test:python-dotnet:*':
    desc: Python and .NET transport task. Use test:python-dotnet:<jsonrpc|rest>.
    vars:
      TRANSPORT: '{{index .MATCH 0}}'
      LABEL_FILTER: 'suite-python-dotnet && {{.TRANSPORT}}'
      REPORT_NAME: 'report-agntcy-a2a-python-dotnet-{{.TRANSPORT}}'
    preconditions:
      - sh: 'case "{{.TRANSPORT}}" in jsonrpc|rest) exit 0 ;; *) exit 1 ;; esac'
        msg: 'Unsupported Python and .NET transport "{{.TRANSPORT}}".'
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  test:interop:run:
    internal: true
    deps:
      - deps:update
    cmds:
      - mkdir -p ./reports
      - |
        set +e
        (
          cd tests &&
          go test . -v -failfast -test.v -test.paniconexit0 \
            -ginkgo.timeout 20m -timeout 20m -ginkgo.v \
            {{if .LABEL_FILTER}}-ginkgo.label-filter='{{.LABEL_FILTER}}'{{end}} \
            --ginkgo.json-report=../reports/{{.REPORT_NAME}}.json \
            --ginkgo.junit-report=../reports/{{.REPORT_NAME}}.xml
        )
        test_status=$?
        go run ./tools/report_dashboard.go --reports-dir ./reports --output ./reports/index.html
        dashboard_status=$?
        if [ "$test_status" -ne 0 ]; then
          exit "$test_status"
        fi
        exit "$dashboard_status"

  default:
    cmd: task -l
