---
version: '3'

silent: true

tasks:
  test:
    desc: Default A2A interoperability tests
    cmds:
      - task: test:rust-go
      - task: test:rust-dotnet

  test:rust-go:
    desc: Rust and Go interoperability test matrix across JSON-RPC, HTTP+JSON, and gRPC
    cmds:
      - task: test:rust-go:run
        vars:
          LABEL_FILTER: suite-rust-go
          REPORT_NAME: report-agntcy-a2a

  test:rust-dotnet:
    desc: Rust and .NET interoperability test matrix for the current JSON-RPC and HTTP+JSON slices
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet

  test:rust-dotnet:jsonrpc:
    desc: Rust and .NET JSON-RPC interoperability matrix
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && jsonrpc
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-jsonrpc

  test:rust-dotnet:jsonrpc:dotnet-dotnet:
    desc: .NET client to .NET server JSON-RPC interoperability test
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && jsonrpc && dotnet-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-dotnet-dotnet

  test:rust-dotnet:jsonrpc:dotnet-rust:
    desc: .NET client to Rust server JSON-RPC interoperability test
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && jsonrpc && dotnet-rust
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-dotnet-rust

  test:rust-dotnet:jsonrpc:rust-dotnet:
    desc: Rust client to .NET server JSON-RPC interoperability test
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && jsonrpc && rust-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-rust-dotnet

  test:rust-dotnet:jsonrpc:rust-rust:
    desc: Rust client to Rust server JSON-RPC interoperability test for the Rust-.NET slice
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && jsonrpc && rust-rust-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-rust-rust

  test:rust-dotnet:rest:
    desc: Rust and .NET HTTP+JSON interoperability matrix
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && rest
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-rest

  test:rust-dotnet:rest:dotnet-dotnet:
    desc: .NET client to .NET server HTTP+JSON interoperability test
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && rest && dotnet-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-rest-dotnet-dotnet

  test:rust-dotnet:rest:dotnet-rust:
    desc: .NET client to Rust server HTTP+JSON interoperability test
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && rest && dotnet-rust
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-rest-dotnet-rust

  test:rust-dotnet:rest:rust-dotnet:
    desc: Rust client to .NET server HTTP+JSON interoperability test
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && rest && rust-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-rest-rust-dotnet

  test:rust-dotnet:rest:rust-rust:
    desc: Rust client to Rust server HTTP+JSON interoperability test for the Rust-.NET slice
    cmds:
      - task: test:rust-dotnet:run
        vars:
          LABEL_FILTER: suite-rust-dotnet && rest && rust-rust-dotnet
          REPORT_NAME: report-agntcy-a2a-rust-dotnet-rest-rust-rust

  test:rust-go:jsonrpc:
    desc: Rust and Go JSON-RPC interoperability matrix
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && jsonrpc
          REPORT_NAME: report-agntcy-a2a-jsonrpc

  test:rust-go:rest:
    desc: Rust and Go HTTP+JSON interoperability matrix
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && rest
          REPORT_NAME: report-agntcy-a2a-rest

  test:rust-go:grpc:
    desc: Rust and Go gRPC interoperability matrix
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && grpc
          REPORT_NAME: report-agntcy-a2a-grpc

  test:rust-go:jsonrpc:go-go:
    desc: Go client to Go server JSON-RPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && jsonrpc && go-go
          REPORT_NAME: report-agntcy-a2a-go-go

  test:rust-go:jsonrpc:go-rust:
    desc: Go client to Rust server JSON-RPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && jsonrpc && go-rust
          REPORT_NAME: report-agntcy-a2a-go-rust

  test:rust-go:jsonrpc:rust-go:
    desc: Rust client to Go server JSON-RPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && jsonrpc && rust-go
          REPORT_NAME: report-agntcy-a2a-rust-go

  test:rust-go:jsonrpc:rust-rust:
    desc: Rust client to Rust server JSON-RPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && jsonrpc && rust-rust
          REPORT_NAME: report-agntcy-a2a-rust-rust

  test:rust-go:rest:go-go:
    desc: Go client to Go server HTTP+JSON interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && rest && go-go
          REPORT_NAME: report-agntcy-a2a-rest-go-go

  test:rust-go:rest:go-rust:
    desc: Go client to Rust server HTTP+JSON interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && rest && go-rust
          REPORT_NAME: report-agntcy-a2a-rest-go-rust

  test:rust-go:rest:rust-go:
    desc: Rust client to Go server HTTP+JSON interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && rest && rust-go
          REPORT_NAME: report-agntcy-a2a-rest-rust-go

  test:rust-go:rest:rust-rust:
    desc: Rust client to Rust server HTTP+JSON interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && rest && rust-rust
          REPORT_NAME: report-agntcy-a2a-rest-rust-rust

  test:rust-go:grpc:go-go:
    desc: Go client to Go server gRPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && grpc && go-go
          REPORT_NAME: report-agntcy-a2a-grpc-go-go

  test:rust-go:grpc:go-rust:
    desc: Go client to Rust server gRPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && grpc && go-rust
          REPORT_NAME: report-agntcy-a2a-grpc-go-rust

  test:rust-go:grpc:rust-go:
    desc: Rust client to Go server gRPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && grpc && rust-go
          REPORT_NAME: report-agntcy-a2a-grpc-rust-go

  test:rust-go:grpc:rust-rust:
    desc: Rust client to Rust server gRPC interoperability test
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: suite-rust-go && grpc && rust-rust
          REPORT_NAME: report-agntcy-a2a-grpc-rust-rust

  test:interop:run:
    internal: true
    cmds:
      - mkdir -p ./reports
      - >
        cd tests &&
        go test . -v -failfast -test.v -test.paniconexit0
        -ginkgo.timeout 20m -timeout 20m -ginkgo.v
        {{if .LABEL_FILTER}}-ginkgo.label-filter='{{.LABEL_FILTER}}'{{end}}
        --ginkgo.json-report=../reports/{{.REPORT_NAME}}.json
        --ginkgo.junit-report=../reports/{{.REPORT_NAME}}.xml

  test:rust-go:run:
    internal: true
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  test:rust-dotnet:run:
    internal: true
    cmds:
      - task: test:interop:run
        vars:
          LABEL_FILTER: '{{.LABEL_FILTER}}'
          REPORT_NAME: '{{.REPORT_NAME}}'

  default:
    cmd: task -l