topology:
    clients:
        "alice":
            spireMtls: true
            connectedTo:
                - "cluster-b"
            image: ghcr.io/agntcy/slim/bindings-examples:0.7.1          
            args: 
              - p2p
              - --local
              - org/ns/alice
              - --spire-socket-path
              - unix:/tmp/spire-agent/public/api.sock
              - --spire-jwt-audience
              - slim-demo
            assertFor: "received: hello"                                        
        "bob":
            spireMtls: true
            connectedTo:
                - "cluster-a"
            image: ghcr.io/agntcy/slim/bindings-examples:0.7.1                      
            args:
              - p2p
              - --local
              - org/ns/bob
              - --remote
              - org/ns/alice
              - --spire-socket-path
              - unix:/tmp/spire-agent/public/api.sock
              - --spire-jwt-audience
              - slim-demo
              - --message
              - hello
              - --iterations
              - 10
            assertFor: "Sent message hello - 10/10"
    clusters:
        "cluster-a":
            spireMtls: true
            #deployAsDaemonSet: false
            replicaCount: 2             
        "cluster-b":
            spireMtls: true
            #deployAsDaemonSet: false
            replicaCount: 2