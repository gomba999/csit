# Default values for slim-control-plane.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: "ghcr.io/agntcy/slim/control-plane"
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

fullnameOverride: "slim-control"

config:
  northbound:
    endpoint: "0.0.0.0:{{ .Values.service.north.port }}"
    tls:
      insecure: true

  southbound:
    endpoint: "0.0.0.0:{{ .Values.service.south.port }}"
    tls:
      insecure: true
    # tls:
    #   insecure: false
    #   useSpiffe: true
    # auth:
    #   type: spire
    #   socketPath: "unix:///run/spire/agent-sockets/api.sock"

  tracing:
    log_level: debug

spire:
  enabled: false

service:
  type: ClusterIP
  south:
    port: 50052
  north:
    port: 50051
