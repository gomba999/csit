---
version: '3'

silent: true

vars:
  KIND_CLUSTER_NAME: '{{ .KIND_CLUSTER_NAME | default "agntcy-test" }}'

  ## Image config
  IMAGE_REPO: '{{ .IMAGE_REPO | default "ghcr.io/agntcy" }}'
  SLIM_IMAGE_TAG: '{{ .SLIM_IMAGE_TAG | default "0.3.15" }}'
  MCP_PROXY_IMAGE_TAG: '{{ .MCP_PROXY_IMAGE_TAG | default "0.1.5" }}'
  SLIM_CHART_TAG: '{{ .SLIM_CHART_TAG | default "v0.1.8" }}'
  SLIM_CONFIG: '{{ .SLIM_CONFIG | default "base" }}'

  IMAGE_BAKE_OPTS: '{{ .IMAGE_BAKE_OPTS | default "--set *.platform=linux/arm64" }}'
  LANGCHAIN_APP_TAG: '{{ .LANGCHAIN_APP_TAG | default "v0.0.12" }}'
  AUTOGEN_APP_TAG: '{{ .AUTOGEN_APP_TAG | default "v0.0.12" }}'

  AZURE_OPENAI_API_KEY: '{{ .AZURE_OPENAI_API_KEY | default "" }}'
  AZURE_OPENAI_ENDPOINT: '{{ .AZURE_OPENAI_ENDPOINT | default "" }}'

  HELM_NAMESPACE: '{{ .HELM_NAMESPACE | default "default" }}'
  MCP_PROXY_DEPLOY: '{{ .MCP_PROXY_DEPLOY | default "true" }}'
  LLAMAINDEX_TIME_AGENT_TAG: '{{ .LLAMAINDEX_TIME_AGENT_TAG | default "0.1.2" }}'
  MCP_SERVER_TIME_TAG: '{{ .MCP_SERVER_TIME_TAG | default "0.1.2" }}'

  REMOVE_CONTAINERS: '{{ .REMOVE_CONTAINERS | default "true" }}'

  RUNNER_TYPE: '{{ .RUNNER_TYPE | default "docker" }}'

  SPIRE_NAMESPACE: '{{ .SPIRE_NAMESPACE | default "spire-server" }}'


tasks:
  k8s:port-forward:setup:
    internal: true
    cmds:
      - kubectl port-forward svc/agntcy-slim -n {{ .HELM_NAMESPACE }} 46357 &
      - sleep 1

  k8s:port-forward:teardown:
    internal: true
    cmds:
      - kill -9 $(ps aux | grep port-forward | grep agntcy-slim | awk '{print $2}') || true

  test-env:deploy:
    desc: Deploy agntcy slim test env
    cmds:
      - |
        helm upgrade agntcy-slim \
          oci://{{ .IMAGE_REPO }}/slim/helm/slim \
          --version {{ .SLIM_CHART_TAG }} \
          --set slim.image.tag="{{ .SLIM_IMAGE_TAG }}" \
          --set mcpProxy.image.tag="{{ .MCP_PROXY_IMAGE_TAG }}" \
          -f components/config/{{ .SLIM_CONFIG }}/server-config.yaml \
          --namespace {{ .HELM_NAMESPACE }} \
          --create-namespace \
          --install \
          --wait \
          --wait-for-jobs \
          --timeout "15m"                 

  test-env:cleanup:
    desc: Remove agent slim test env
    cmds:
      - helm delete --namespace {{ .HELM_NAMESPACE }} agntcy-slim

  cert-manager:deploy:
    desc: Deploy cert-manager
    cmds:
      - |
        helm repo add jetstack https://charts.jetstack.io --force-update
        helm upgrade cert-manager jetstack/cert-manager \
          --namespace cert-manager \
          --create-namespace \
          --version v1.17.2 \
          --set crds.enabled=true \
          --install \
          --wait \
          --wait-for-jobs \
          --timeout "15m"

  cert-manager:remove:
    desc: Remove cert-manager
    cmds:
      - helm delete cert-manger -n cert-manger

  certificates:create:
    desc: Create certificates
    cmds:
      - kubectl apply -f components/certificates

  spire:deploy:
    desc: Deploy SPIRE server
    cmds:
      - |
        helm upgrade --install  \
        spire-crds \
        spire-crds \
        --repo https://spiffe.github.io/helm-charts-hardened/ \
        --namespace {{ .SPIRE_NAMESPACE }} \
        --create-namespace \
        --wait \
        --wait-for-jobs \
        --timeout "15m"
      - |
        helm upgrade --install  \
        spire \
        spire \
        --repo https://spiffe.github.io/helm-charts-hardened/ \
        --namespace {{ .SPIRE_NAMESPACE }} \
        --create-namespace \
        --wait \
        --wait-for-jobs \
        --timeout "15m"

  spire:remove:
    desc: Remove SPIRE server
    cmds:
        - helm delete spire -n {{ .SPIRE_NAMESPACE }}
        - helm delete spire-crds -n {{ .SPIRE_NAMESPACE }}

  build:agentic-apps:
    desc: Build agentic containers
    dir: ./agentic-apps
    cmds:
      - IMAGE_TAG={{ .LANGCHAIN_APP_TAG }} docker buildx bake {{ .IMAGE_BAKE_OPTS }} --load

  test:sanity:
    desc: Sanity slim test
    cmds:
      - SLIM_CONFIG={{ .SLIM_CONFIG }} NAMESPACE={{.HELM_NAMESPACE}} IMAGE_REPO={{.IMAGE_REPO}} LANGCHAIN_APP_TAG={{.LANGCHAIN_APP_TAG}} AUTOGEN_APP_TAG={{.AUTOGEN_APP_TAG}} go test ./tests -v -failfast -test.v -test.paniconexit0 -ginkgo.timeout 30m -timeout 30m -ginkgo.v -ginkgo.focus "Agntcy slim sanity test" --ginkgo.json-report=../reports/report-slim-sanity.json --ginkgo.junit-report=../reports/report-slim-sanity.xml

  test:mcp-server:
    desc: Test MCP over Slim
    cmds:
      - NAMESPACE={{.HELM_NAMESPACE}} IMAGE_REPO={{.IMAGE_REPO}} MCP_SERVER_TIME_TAG={{.MCP_SERVER_TIME_TAG}} LLAMAINDEX_TIME_AGENT_TAG={{.LLAMAINDEX_TIME_AGENT_TAG}} go test ./tests -v -failfast -test.v -test.paniconexit0 -ginkgo.timeout 30m -timeout 30m -ginkgo.v -ginkgo.focus "MCP over Slim test" --ginkgo.json-report=../reports/report-slim-mcp-server.json --ginkgo.junit-report=../reports/report-slim-mcp-server.xml

  test:mcp-server:slim-native:
    desc: Test Slim native MCP server
    cmds:
      - NAMESPACE={{.HELM_NAMESPACE}} IMAGE_REPO={{.IMAGE_REPO}} MCP_SERVER_TIME_TAG={{.MCP_SERVER_TIME_TAG}} LLAMAINDEX_TIME_AGENT_TAG={{.LLAMAINDEX_TIME_AGENT_TAG}} go test ./tests -v -failfast -test.v -test.paniconexit0 -ginkgo.timeout 30m -timeout 30m -ginkgo.v -ginkgo.focus "Slim native MCP server" --ginkgo.json-report=../reports/report-slim-native-mcp-server.json --ginkgo.junit-report=../reports/report-slim-native-mcp-server.xml

  test:mcp-server:mcp-proxy:
    desc: Test MCP server via MCP proxy
    cmds:
      - NAMESPACE={{.HELM_NAMESPACE}} IMAGE_REPO={{.IMAGE_REPO}} MCP_SERVER_TIME_TAG={{.MCP_SERVER_TIME_TAG}} LLAMAINDEX_TIME_AGENT_TAG={{.LLAMAINDEX_TIME_AGENT_TAG}} go test ./tests -v -failfast -test.v -test.paniconexit0 -ginkgo.timeout 30m -timeout 30m -ginkgo.v -ginkgo.focus "MCP server via MCP proxy" --ginkgo.json-report=../reports/report-slim-mcp-proxy.json --ginkgo.junit-report=../reports/report-slim-mcp-proxy.xml

  default:
    cmd: task -l