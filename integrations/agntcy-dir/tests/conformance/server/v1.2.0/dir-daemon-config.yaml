server:
  listen_address: "0.0.0.0:8888"
  metrics:
    enabled: false
  oasf_api_validation:
    schema_url: "https://schema.oasf.outshift.com"
  store:
    provider: "oci"
    oci:
      local_dir: "/tmp/store"
      registry_address: "0.0.0.0:8890"
      repository_name: "dir"
      auth_config:
        insecure: true
    verification:
      enabled: true
  routing:
    listen_address: "/ip4/0.0.0.0/tcp/9090"
    refresh_interval: "1s"
  database:
    type: "sqlite"
  publication:
    scheduler_interval: 1s
    worker_count: 1
    worker_timeout: 30m
  naming:
    ttl: 168h

reconciler:
  local_registry:
    registry_address: "0.0.0.0:8890"
    repository_name: "dir"
    auth_config:
      insecure: true
  regsync:
    enabled: true
    interval: 10s
  indexer:
    enabled: true
    interval: 10s
  signature:
    enabled: true
    interval: 10s
    ttl: 168h
    record_timeout: 30s
  name:
    enabled: true
    interval: 10s
    ttl: 168h
    record_timeout: 30s
