version: "3"

silent: true

vars:
  REPORTS_DIR: '{{.REPORTS_DIR | default "../benchmarks/agntcy-slim/reports"}}'
  PUBLISHED_DIR: '{{.PUBLISHED_DIR | default "./published"}}'

tasks:
  dashboard:prepare:
    desc: Create analitics publish directories
    cmds:
      - mkdir -p "{{.PUBLISHED_DIR}}/smoke"

  dashboard:sync:markdown:
    desc: Sync smoke markdown outputs from benchmark reports
    deps: [dashboard:prepare]
    cmds:
      - |
        for file in ci-smoke-report.md suite_summary.md technical_report.md; do
          if [ -f "{{.REPORTS_DIR}}/$file" ]; then
            cp "{{.REPORTS_DIR}}/$file" "{{.PUBLISHED_DIR}}/smoke/$file"
          fi
        done

  dashboard:render:
    desc: Render static HTML evidence dashboard
    deps: [dashboard:prepare]
    cmds:
      - |
        REPORTS_DIR="{{.REPORTS_DIR}}" \
        OUTPUT_FILE="{{.PUBLISHED_DIR}}/index.html" \
        TEMPLATE_FILE="./templates/dashboard.html.tmpl" \
        bash ./scripts/render-dashboard.sh

  dashboard:render:summary:
    desc: Render optional C1 markdown summary
    deps: [dashboard:prepare]
    cmds:
      - |
        REPORTS_DIR="{{.REPORTS_DIR}}" \
        OUTPUT_FILE="{{.PUBLISHED_DIR}}/c1-evidence-summary.md" \
        TEMPLATE_FILE="./templates/c1-summary.md.tmpl" \
        bash ./scripts/render-c1-summary.sh

  dashboard:build:
    desc: Sync evidence markdown and render static HTML dashboard
    deps: [dashboard:sync:markdown, dashboard:render, dashboard:render:summary]

  dashboard:clean:
    desc: Remove generated publish artifacts
    cmds:
      - rm -f "{{.PUBLISHED_DIR}}/index.html"
      - rm -f "{{.PUBLISHED_DIR}}/c1-evidence-summary.md"
      - rm -f "{{.PUBLISHED_DIR}}/smoke/ci-smoke-report.md" "{{.PUBLISHED_DIR}}/smoke/suite_summary.md" "{{.PUBLISHED_DIR}}/smoke/technical_report.md"

  # Backward-compatible aliases
  c1:build:
    desc: Alias for dashboard:build
    deps: [dashboard:build]
