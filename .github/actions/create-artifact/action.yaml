name: Setup Environment
description: "Action to create an artifact from test reports and upload it to GitHub Actions."
inputs:
  artifact-name:
    description: "Name of the artifact"
    required: false
    default: "test-results"
  path-to-archive:
    description: "File or directory to upload (prefer a directory path ending with /)"
    required: false
    default: "./**/*report*.json"
  compression-level:
    description: "Compression level of the artifact"
    required: false
    default: "9"
  retention-days:
    description: "Retention days for the artifact"
    required: false
    default: "30"

runs:
  using: "composite"
  steps:
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.path-to-archive }}
        compression-level: ${{ inputs.compression-level }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn
