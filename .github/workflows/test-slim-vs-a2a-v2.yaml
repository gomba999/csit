name: test-slim-vs-a2a-v2

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'benchmarks/slim-vs-a2a-v2/**'
      - '.github/workflows/test-slim-vs-a2a-v2.yaml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: benchmarks/slim-vs-a2a-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run CI smoke
        run: task compare:ci:smoke
