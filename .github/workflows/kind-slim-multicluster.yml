#
# KinD multicluster + ingress LoadBalancer (cloud-provider-kind) + Helm stack via Task.
# Builds slim dataplane and control-plane images, loads them into both clusters, then
# task cluster:up → task stack:install (same as task stack:up with built tags).
name: kind-slim-multicluster

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "kind-slim-multi-host/**"
      - ".github/workflows/kind-slim-multicluster.yml"
      - ".github/actions/setup-k8s/**"
  push:
    branches:
      - main
    paths:
      - "kind-slim-multi-host/**"
      - ".github/workflows/kind-slim-multicluster.yml"
      - ".github/actions/setup-k8s/**"

permissions:
  contents: read
  packages: read

defaults:
  run:
    working-directory: kind-slim-multi-host

jobs:
  multicluster:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve slim image tags
        id: resolve-slim-tags
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          tag="local-${GITHUB_SHA:0:12}"
          echo "slim_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "controller_tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout slim source
        uses: actions/checkout@v4
        with:
          repository: agntcy/slim
          fetch-depth: 1
          path: slim-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build slim images (linux/amd64)
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          SLIM_TAG: ${{ steps.resolve-slim-tags.outputs.slim_tag }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --tag "ghcr.io/agntcy/slim:${SLIM_TAG}" \
            --file slim-src/data-plane/Dockerfile \
            slim-src

          docker buildx build \
            --platform linux/amd64 \
            --load \
            --tag "ghcr.io/agntcy/slim/control-plane:${SLIM_TAG}" \
            --file slim-src/control-plane/Dockerfile \
            slim-src

      - name: Setup Kubernetes tooling
        uses: ./.github/actions/setup-k8s
        with:
          kind-version: "0.24.0"
          helm-version: "3.14.4"
          
      - name: Install C/C++ toolchain
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          curl -L https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19
          sudo apt-get install -y \
            pkg-config \
            make \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            gcc-x86-64-linux-gnu \
            g++-x86-64-linux-gnu

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.41.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Task prereq
        run: task prereq

      # Ubuntu runners may not ship `dig` (bind-dnsutils); host DNS checks need it.
      - name: Install dnsutils
        run: sudo apt-get update && sudo apt-get install -y dnsutils

      - name: Task cluster:up (KinD clusters)
        run: task cluster:up

      - name: Load slim images into both KinD clusters
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          SLIM_TAG: ${{ steps.resolve-slim-tags.outputs.slim_tag }}
        run: |
          set -euo pipefail
          for cluster in csit-a csit-b; do
            for img in \
              "ghcr.io/agntcy/slim:${SLIM_TAG}" \
              "ghcr.io/agntcy/slim/control-plane:${SLIM_TAG}"; do
              kind load docker-image "${img}" --name "${cluster}"
            done
          done

      # Charts from checked-out agntcy/slim (charts/slim, charts/slim-control-plane); tags match kind-loaded images.
      - name: Install ingress stack and Helm apps (built images)
        env:
          SLIM_IMAGE_TAG: ${{ steps.resolve-slim-tags.outputs.slim_tag }}
          CTRL_IMAGE_TAG: ${{ steps.resolve-slim-tags.outputs.controller_tag }}
          SLIM_CHARTS_PATH: ${{ github.workspace }}/slim-src/charts
          SLIM_REPO_PATH: ${{ github.workspace }}/slim-src
        run: task stack:install

      - name: Verify clusters
        run: |
          set -euo pipefail
          kubectl --context kind-csit-a get nodes
          kubectl --context kind-csit-b get nodes
          kubectl --context kind-csit-a -n ingress-nginx get pods

      - name: Verify ingress LoadBalancer on cluster A
        run: |
          set -euo pipefail
          test "$(kubectl --context kind-csit-a get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.type}')" = "LoadBalancer"

      - name: Verify CoreDNS cross-cluster alias on cluster B
        run: |
          set -euo pipefail
          kubectl --context kind-csit-b get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}' | grep -q "BEGIN csit-cross-cluster"

      - name: Verify legacy csit.peer absent
        run: |
          set -euo pipefail
          for ctx in kind-csit-a kind-csit-b; do
            if kubectl --context "$ctx" get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}' | grep -q "BEGIN csit-peer"; then
              echo "ERROR: legacy csit-peer block still present on $ctx" >&2
              exit 1
            fi
          done

      - name: Verify host DNS helper
        run: ./scripts/verify-local-dns-helper.sh

      - name: Verify DNS resolution (cluster B → controller hostname)
        run: |
          set -euo pipefail
          source .gen/ingress-a.env
          kubectl --context kind-csit-b run dns-verify-b \
            -n default \
            --rm \
            --attach \
            --restart=Never \
            --image=docker.io/library/busybox:1.36 \
            --command -- \
            sh -c "nslookup control.cluster-a.csit.test | grep -F '${INGRESS_A_LB_IP}'"

      - name: Verify Helm releases (optional apps)
        run: |
          set -euo pipefail
          helm list --kube-context kind-csit-a --namespace admin | grep -q slim-control
          helm list --kube-context kind-csit-a --namespace cluster-a | grep -q agntcy-cluster-a
          helm list --kube-context kind-csit-b --namespace cluster-b | grep -q agntcy-cluster-b

      - name: Teardown full stack
        if: always()
        run: task stack:down || true
