name: test-benchmarks-slim

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-benchmarks-slim.yaml"
      - "Taskfile.yml"
      - "benchmarks/Taskfile.yml"
      - "benchmarks/agntcy-slim/**"
  pull_request:
    paths:
      - ".github/workflows/test-benchmarks-slim.yaml"
      - "Taskfile.yml"
      - "benchmarks/Taskfile.yml"
      - "benchmarks/agntcy-slim/**"
  workflow_dispatch:
    inputs:
      run_capacity:
        description: "Run bounded capacity sweeps in addition to the smoke suite"
        required: false
        default: false
        type: boolean

jobs:
  slim-benchmark-smoke:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          go: true

      - name: Install slimctl
        shell: bash
        run: |
          task benchmarks:slim:deps:slimctl-download SLIMCTL_PATH="$HOME/.local/bin/slimctl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run SLIM benchmark smoke suite
        shell: bash
        run: |
          set -o pipefail
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          mkdir -p "$REPORT_DIR"
          stdbuf -oL -eL task benchmarks:slim:benchmark:ci:suite-smoke 2>&1 | tee "$REPORT_DIR/ci-smoke.log"

      - name: Build smoke markdown artifact
        if: always()
        shell: bash
        run: |
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          OUTPUT_FILE="$REPORT_DIR/ci-smoke-report.md"
          mkdir -p "$REPORT_DIR"

          {
            echo "# SLIM Benchmark CI Smoke Report"
            echo
            echo "- Workflow: ${GITHUB_WORKFLOW}"
            echo "- Job: slim-benchmark-smoke"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo

            if [ -f "$REPORT_DIR/ci-smoke.log" ]; then
              echo "## Live Progress Markers"
              echo
              grep -E 'BENCHMARK_RESULT|MODE_SUMMARY|CAPACITY_SWEEP_STEP|CAPACITY_CASE_SUMMARY' "$REPORT_DIR/ci-smoke.log" || true
              echo
            fi

            if [ -f "$REPORT_DIR/suite_summary.md" ]; then
              echo "## Suite Summary"
              echo
              cat "$REPORT_DIR/suite_summary.md"
              echo
            fi

            if [ -f "$REPORT_DIR/technical_report.md" ]; then
              echo "## Technical Report"
              echo
              cat "$REPORT_DIR/technical_report.md"
              echo
            fi
          } > "$OUTPUT_FILE"

      - name: Stage smoke dashboard artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          PUBLISH_DIR="benchmarks/agntcy-slim/published/smoke"

          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"

          for file in \
            "$REPORT_DIR/results.tsv" \
            "$REPORT_DIR/suite_summary.md" \
            "$REPORT_DIR/technical_report.md" \
            "$REPORT_DIR/ci-smoke-report.md" \
            "$REPORT_DIR/ci-smoke.log"
          do
            if [ -f "$file" ]; then
              cp "$file" "$PUBLISH_DIR/"
            fi
          done

          task benchmarks:slim:reports:dashboard \
            SMOKE_DIR="$PUBLISH_DIR" \
            CAPACITY_DIR="$PUBLISH_DIR" \
            OUTPUT_FILE="$PUBLISH_DIR/index.html"

      - name: Print smoke markdown report
        if: always()
        shell: bash
        run: |
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          for report in \
            "$REPORT_DIR/ci-smoke-report.md" \
            "$REPORT_DIR/suite_summary.md" \
            "$REPORT_DIR/technical_report.md"
          do
            if [ -f "$report" ]; then
              echo "::group::$(basename "$report")"
              cat "$report"
              echo "::endgroup::"
            fi
          done

      - name: Publish smoke step summary
        if: always()
        shell: bash
        run: |
          REPORT_DIR="benchmarks/agntcy-slim/reports"

          {
            echo "# SLIM Benchmark Smoke Summary"
            echo
            echo "- Artifact: ci-smoke-report.md"
            echo "- Workflow: ${GITHUB_WORKFLOW}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo

            echo "## Markdown Reports"
            echo
            for report in "$REPORT_DIR"/*.md; do
              if [ -f "$report" ]; then
                echo "- $(basename "$report")"
              fi
            done
            echo

            if [ -f "$REPORT_DIR/ci-smoke.log" ]; then
              grep -E 'BENCHMARK_RESULT|MODE_SUMMARY|CAPACITY_SWEEP_STEP|CAPACITY_CASE_SUMMARY' "$REPORT_DIR/ci-smoke.log" | tail -n 20 || true
              echo
            fi

            if [ -f "$REPORT_DIR/suite_summary.md" ]; then
              sed -n '1,80p' "$REPORT_DIR/suite_summary.md"
              echo
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slim-benchmark-smoke-report
          path: benchmarks/agntcy-slim/published/smoke
          retention-days: 30

  slim-benchmark-capacity:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_capacity) }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          go: true

      - name: Install slimctl
        shell: bash
        run: |
          task benchmarks:slim:deps:slimctl-download SLIMCTL_PATH="$HOME/.local/bin/slimctl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run SLIM benchmark capacity suite
        shell: bash
        run: |
          set -o pipefail
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          mkdir -p "$REPORT_DIR"
          stdbuf -oL -eL task benchmarks:slim:benchmark:ci:capacity 2>&1 | tee "$REPORT_DIR/ci-capacity.log"

      - name: Build capacity markdown artifact
        if: always()
        shell: bash
        run: |
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          OUTPUT_FILE="$REPORT_DIR/ci-capacity-report.md"
          mkdir -p "$REPORT_DIR"

          {
            echo "# SLIM Benchmark CI Capacity Report"
            echo
            echo "- Workflow: ${GITHUB_WORKFLOW}"
            echo "- Job: slim-benchmark-capacity"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo

            if [ -f "$REPORT_DIR/ci-capacity.log" ]; then
              echo "## Live Progress Markers"
              echo
              grep -E 'BENCHMARK_RESULT|MODE_SUMMARY|CAPACITY_SWEEP_STEP|CAPACITY_CASE_SUMMARY' "$REPORT_DIR/ci-capacity.log" || true
              echo
            fi

            if [ -f "$REPORT_DIR/suite_summary.md" ]; then
              echo "## Suite Summary"
              echo
              cat "$REPORT_DIR/suite_summary.md"
              echo
            fi

            if [ -f "$REPORT_DIR/technical_report.md" ]; then
              echo "## Technical Report"
              echo
              cat "$REPORT_DIR/technical_report.md"
              echo
            fi

            if [ -f "$REPORT_DIR/capacity_sweep.md" ]; then
              echo "## Capacity Sweep"
              echo
              cat "$REPORT_DIR/capacity_sweep.md"
              echo
            fi
          } > "$OUTPUT_FILE"

      - name: Stage capacity dashboard artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          PUBLISH_DIR="benchmarks/agntcy-slim/published/capacity"

          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"

          for file in \
            "$REPORT_DIR/capacity_sweep.md" \
            "$REPORT_DIR/capacity-fire-and-forget.md" \
            "$REPORT_DIR/capacity-request-reply.md" \
            "$REPORT_DIR/capacity-write.md" \
            "$REPORT_DIR/results-fire-and-forget.tsv" \
            "$REPORT_DIR/results-request-reply.tsv" \
            "$REPORT_DIR/results-write.tsv" \
            "$REPORT_DIR/ci-capacity-report.md" \
            "$REPORT_DIR/ci-capacity.log"
          do
            if [ -f "$file" ]; then
              cp "$file" "$PUBLISH_DIR/"
            fi
          done

          task benchmarks:slim:reports:dashboard \
            SMOKE_DIR="$PUBLISH_DIR" \
            CAPACITY_DIR="$PUBLISH_DIR" \
            OUTPUT_FILE="$PUBLISH_DIR/index.html"

      - name: Print capacity markdown report
        if: always()
        shell: bash
        run: |
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          for report in \
            "$REPORT_DIR/ci-capacity-report.md" \
            "$REPORT_DIR/suite_summary.md" \
            "$REPORT_DIR/technical_report.md" \
            "$REPORT_DIR/capacity_sweep.md" \
            "$REPORT_DIR/capacity-fire-and-forget.md" \
            "$REPORT_DIR/capacity-request-reply.md" \
            "$REPORT_DIR/capacity-write.md"
          do
            if [ -f "$report" ]; then
              echo "::group::$(basename "$report")"
              cat "$report"
              echo "::endgroup::"
            fi
          done

      - name: Publish capacity step summary
        if: always()
        shell: bash
        run: |
          REPORT_DIR="benchmarks/agntcy-slim/reports"

          {
            echo "# SLIM Benchmark Capacity Summary"
            echo
            echo "- Artifact: ci-capacity-report.md"
            echo "- Workflow: ${GITHUB_WORKFLOW}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo

            echo "## Markdown Reports"
            echo
            for report in "$REPORT_DIR"/*.md; do
              if [ -f "$report" ]; then
                echo "- $(basename "$report")"
              fi
            done
            echo

            if [ -f "$REPORT_DIR/ci-capacity.log" ]; then
              grep -E 'BENCHMARK_RESULT|MODE_SUMMARY|CAPACITY_SWEEP_STEP|CAPACITY_CASE_SUMMARY' "$REPORT_DIR/ci-capacity.log" | tail -n 40 || true
              echo
            fi

            if [ -f "$REPORT_DIR/capacity_sweep.md" ]; then
              sed -n '1,220p' "$REPORT_DIR/capacity_sweep.md"
              echo
            elif [ -f "$REPORT_DIR/suite_summary.md" ]; then
              sed -n '1,80p' "$REPORT_DIR/suite_summary.md"
              echo
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload capacity markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slim-benchmark-capacity-report
          path: benchmarks/agntcy-slim/published/capacity
          retention-days: 30

  slim-benchmark-basic:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          go: true

      - name: Install slimctl
        shell: bash
        run: |
          task benchmarks:slim:deps:slimctl-download SLIMCTL_PATH="$HOME/.local/bin/slimctl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install SLIM bindings
        shell: bash
        run: task benchmarks:slim:deps:slim-bindings-setup

      - name: Run SLIM basic throughput benchmark
        shell: bash
        run: |
          set -o pipefail
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          mkdir -p "$REPORT_DIR"
          stdbuf -oL -eL task benchmarks:slim:benchmark:ci:basic 2>&1 | tee "$REPORT_DIR/ci-basic.log"

      - name: Stage basic benchmark artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DIR="benchmarks/agntcy-slim/reports"
          PUBLISH_DIR="benchmarks/agntcy-slim/published/basic"

          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"

          if [ -f "$REPORT_DIR/basic-benchmark-results.csv" ]; then
            cp "$REPORT_DIR/basic-benchmark-results.csv" "$PUBLISH_DIR/"
          fi

          if [ -f "$REPORT_DIR/ci-basic.log" ]; then
            cp "$REPORT_DIR/ci-basic.log" "$PUBLISH_DIR/"
          fi

      - name: Publish basic benchmark step summary
        if: always()
        shell: bash
        run: |
          REPORT_DIR="benchmarks/agntcy-slim/reports"

          {
            echo "# SLIM Basic Throughput Benchmark Summary"
            echo
            echo "- Workflow: ${GITHUB_WORKFLOW}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo

            if [ -f "$REPORT_DIR/ci-basic.log" ]; then
              echo "## Results"
              echo
              grep 'BASIC_BENCH_RESULT' "$REPORT_DIR/ci-basic.log" | tail -n 40 || true
              echo
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload basic benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slim-benchmark-basic-report
          path: benchmarks/agntcy-slim/published/basic
          retention-days: 30

