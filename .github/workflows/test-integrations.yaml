name: test-integrations
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      kind_version:
        description: "Kind version"
        required: false
        default: "0.24.0"
      override_slim_image_tag:
        description: "Override Slim image tag"
        required: false
        default: ""
      override_slim_chart_tag:
        description: "Override Slim chart tag"
        required: false
        default: ""
      skip_directory_test:
        description: "Skip directory tests"
        required: false
        default: true
        type: boolean
      skip_slim_test:
        description: "Skip slim tests"
        required: false
        default: true
        type: boolean
      skip_slim_spire_test:
        description: "Skip slim with SPIRE tests"
        required: false
        default: true
        type: boolean
      skip_a2a_test:
        description: "Skip A2A interoperability tests"
        required: false
        default: false
        type: boolean
      skip_slim_a2a_test:
        description: "Skip A2A over SLIMRPC interoperability tests"
        required: false
        default: false
        type: boolean
      run_agentic_apps_test:
        description: "Run agentic apps tests"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 4 * * *"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run-a2a: ${{ steps.compute.outputs.run-a2a }}
      run-a2a-slimrpc: ${{ steps.compute.outputs.run-a2a-slimrpc }}
      run-slim: ${{ steps.compute.outputs.run-slim }}
      run-directory: ${{ steps.compute.outputs.run-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect integration changes
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' && github.event_name != 'schedule' }}
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            a2a:
              - integrations/agntcy-a2a/**
            a2a-slimrpc:
              - integrations/agntcy-a2a-slimrpc/**
            slim:
              - integrations/agntcy-slim/**
            directory:
              - integrations/agntcy-dir/**
            shared:
              - .github/workflows/test-integrations.yaml
              - Taskfile.yml
              - integrations/Taskfile.yml
              - .github/actions/setup-env/**
              - .github/actions/setup-go/**
              - .github/actions/setup-python/**
              - .github/actions/setup-k8s/**
              - .github/actions/deploy-components/**
              - .github/actions/create-artifact/**
              - .github/actions/collect-reports/**

      - name: Compute job selection
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            run_a2a=true
            run_a2a_slimrpc=true
            run_slim=true
            run_directory=true
          elif [[ "${{ steps.filter.outputs.a2a }}" == "true" || "${{ steps.filter.outputs.a2a-slimrpc }}" == "true" || "${{ steps.filter.outputs.slim }}" == "true" || "${{ steps.filter.outputs.directory }}" == "true" ]]; then
            run_a2a=${{ steps.filter.outputs.a2a }}
            run_a2a_slimrpc=${{ steps.filter.outputs.a2a-slimrpc }}
            run_slim=${{ steps.filter.outputs.slim }}
            run_directory=${{ steps.filter.outputs.directory }}
          elif [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            run_a2a=true
            run_a2a_slimrpc=true
            run_slim=true
            run_directory=true
          else
            run_a2a=false
            run_a2a_slimrpc=false
            run_slim=false
            run_directory=false
          fi

          echo "run-a2a=$run_a2a" >> "$GITHUB_OUTPUT"
          echo "run-a2a-slimrpc=$run_a2a_slimrpc" >> "$GITHUB_OUTPUT"
          echo "run-slim=$run_slim" >> "$GITHUB_OUTPUT"
          echo "run-directory=$run_directory" >> "$GITHUB_OUTPUT"

  set-kind-version:
    needs: [detect-changes]
    if: ${{ (github.event_name == 'workflow_dispatch' && (!inputs.skip_slim_test || !inputs.skip_directory_test)) || (github.event_name != 'workflow_dispatch' && (needs.detect-changes.outputs.run-slim == 'true' || needs.detect-changes.outputs.run-directory == 'true')) }}
    runs-on: ubuntu-latest
    outputs:
      kind-version: ${{steps.set-kind-version.outputs.kind-version }}
    steps:
      - name: Set KinD version
        id: set-kind-version
        env:
          KIND_VERSION: "0.24.0"
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == 'workflow_dispatch' ]; then
              KIND_VERSION="${{ inputs.kind_version }}"
          fi

          echo "Set KinD version to: $KIND_VERSION"
          echo "kind-version=$KIND_VERSION" >> "$GITHUB_OUTPUT"

  run-tests-slim-topology:
    if: ${{ (github.event_name == 'workflow_dispatch' && !inputs.skip_slim_test) || (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.run-slim == 'true') }}
    needs: [detect-changes, set-kind-version]
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      id-token: "write"
      packages: "read"
      attestations: "read"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python: true
          go: false

      - name: Setup K8S Tools
        uses: ./.github/actions/setup-k8s
        with:
          kind-version: ${{ needs.set-kind-version.outputs.kind-version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build slim bindings examples image (linux/amd64)
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --tag "ghcr.io/agntcy/slim/bindings-examples:local" \
            --file integrations/agntcy-slim/examples/Dockerfile \
            integrations/agntcy-slim/examples

      - name: Deploy Slim with Controller
        uses: ./.github/actions/deploy-components
        with:
          deploy-slim: "false"
          deploy-spire: "true"
          deploy-slim-topology: "true"
          slim-config: "spire"
          slim-image-tag: ${{ inputs.override_slim_image_tag }}
          slim-controller-image-tag: ${{ inputs.override_slim_image_tag }}
          slim-chart-tag: ${{ inputs.override_slim_chart_tag }}

      - name: Load slim bindings examples image into kind
        shell: bash
        run: |
          set -euo pipefail
          kind load docker-image "ghcr.io/agntcy/slim/bindings-examples:local" --name "agntcy-test"

      - name: Run slim topology test
        run: task integrations:slim:test:topology
        shell: bash

      - name: Create artifact from integrations test reports
        uses: ./.github/actions/create-artifact
        with:
          artifact-name: "slim-test-result"

  run-tests-directory-conformance:
    if: ${{ (github.event_name == 'workflow_dispatch' && !inputs.skip_directory_test) || (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.run-directory == 'true') }}
    needs: [detect-changes]
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      id-token: "write"
      packages: "read"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python: false
          go: true
          go-version: "1.24.4"

      - name: Run Directory client/server conformance tests
        continue-on-error: true
        run: task integrations:directory:tests:client-server:test:all
        shell: bash

      - name: Create artifact from conformance reports
        uses: ./.github/actions/create-artifact
        with:
          artifact-name: "directory-conformance-test-result"
          path-to-archive: |
            ./summary.html

  run-tests-a2a:
    if: ${{ (github.event_name == 'workflow_dispatch' && !inputs.skip_a2a_test) || (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.run-a2a == 'true') }}
    needs: [detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add one entry per SDK pair. Each row runs as its own parallel job.
          # Future pairs should follow the same shape, including the task and
          # runtime setup required for that SDK combination.
          - id: rust-go
            display-name: Rust/Go
            task: integrations:a2a:test:rust-go
            artifact-name: a2a-interop-test-result-rust-go
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "false"
            dotnet-version: "8.0.x"
          - id: python-go
            display-name: Python/Go
            task: integrations:a2a:test:python-go
            artifact-name: a2a-interop-test-result-python-go
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "false"
            dotnet-version: "8.0.x"
          - id: rust-python
            display-name: Rust/Python
            task: integrations:a2a:test:rust-python
            artifact-name: a2a-interop-test-result-rust-python
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "false"
            dotnet-version: "8.0.x"
          - id: rust-dotnet
            display-name: Rust/C#
            task: integrations:a2a:test:rust-dotnet
            artifact-name: a2a-interop-test-result-rust-dotnet
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "true"
            dotnet-version: "8.0.x"
          - id: go-dotnet
            display-name: Go/C#
            task: integrations:a2a:test:go-dotnet
            artifact-name: a2a-interop-test-result-go-dotnet
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "true"
            dotnet-version: "8.0.x"
          - id: python-dotnet
            display-name: Python/C#
            task: integrations:a2a:test:python-dotnet
            artifact-name: a2a-interop-test-result-python-dotnet
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "true"
            dotnet-version: "8.0.x"
          - id: self-go
            display-name: Self Go
            task: integrations:a2a:test:self-go
            artifact-name: a2a-interop-test-result-self-go
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "false"
            dotnet-version: "8.0.x"
          - id: self-rust
            display-name: Self Rust
            task: integrations:a2a:test:self-rust
            artifact-name: a2a-interop-test-result-self-rust
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "false"
            dotnet-version: "8.0.x"
          - id: self-python
            display-name: Self Python
            task: integrations:a2a:test:self-python
            artifact-name: a2a-interop-test-result-self-python
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "false"
            dotnet-version: "8.0.x"
          - id: self-dotnet
            display-name: Self C#
            task: integrations:a2a:test:self-dotnet
            artifact-name: a2a-interop-test-result-self-dotnet
            setup-python: "false"
            setup-uv: "true"
            setup-go: "true"
            go-version: "1.24.4"
            setup-dotnet: "true"
            dotnet-version: "8.0.x"

    name: A2A ${{ matrix.display-name }}

    permissions:
      contents: "read"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python: ${{ matrix.setup-python }}
          uv: ${{ matrix.setup-uv }}
          go: ${{ matrix.setup-go }}
          go-version: ${{ matrix.go-version }}
          dotnet: ${{ matrix.setup-dotnet }}
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run A2A ${{ matrix.display-name }} interoperability tests
        id: run-tests
        run: task ${{ matrix.task }}
        shell: bash
        continue-on-error: true

      - name: Generate test summary
        if: ${{ always() }}
        shell: bash
        run: |
          echo "### A2A ${{ matrix.display-name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          reports_dir="./integrations/agntcy-a2a/reports"
          if [[ -d "$reports_dir" ]]; then
            mapfile -t xmls < <(find "$reports_dir" -name "*.xml" 2>/dev/null | sort)
            if [[ ${#xmls[@]} -gt 0 ]]; then
              total_passed=0 total_failures=0 total_errors=0 total_skipped=0
              echo "| Report | Passed | Failed | Errors | Skipped | Time |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|--------|--------|--------|---------|------|" >> "$GITHUB_STEP_SUMMARY"
              for xml in "${xmls[@]}"; do
                name=$(basename "$xml" .xml)
                tests=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo "0")
                failures=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo "0")
                errors=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo "0")
                skipped=$(grep -c '<skipped' "$xml" || echo "0")
                time=$(grep -oP 'time="\K[0-9.]+' "$xml" | head -1 || echo "0")
                passed=$((tests - failures - errors - skipped))
                echo "| $name | $passed | $failures | $errors | $skipped | ${time}s |" >> "$GITHUB_STEP_SUMMARY"
                total_passed=$((total_passed + passed))
                total_failures=$((total_failures + failures))
                total_errors=$((total_errors + errors))
                total_skipped=$((total_skipped + skipped))
              done
              echo "| **Total** | **$total_passed** | **$total_failures** | **$total_errors** | **$total_skipped** | |" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"

              # Print failed test details
              all_failures=""
              for xml in "${xmls[@]}"; do
                while IFS= read -r line; do
                  [[ -n "$line" ]] && all_failures+="$line"$'\n'
                done < <(sed -n '/<testcase/,/<\/testcase>/p' "$xml" | awk '
                  /<testcase/ { name=""; match($0, /name="([^"]*)"/, m); name=m[1] }
                  /<failure/ {
                    match($0, /message="([^"]*)"/, m)
                    msg = m[1]
                    sub(/&#10;.*/, "", msg)
                    sub(/\\n.*/, "", msg)
                    if (length(msg) > 300) msg = substr(msg, 1, 300) "..."
                    print "- **" name "**: `" msg "`"
                  }
                ')
              done
              if [[ -n "$all_failures" ]]; then
                echo "<details><summary>❌ Failed tests</summary>" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "$all_failures" >> "$GITHUB_STEP_SUMMARY"
                echo "</details>" >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              echo "No JUnit XML reports found." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No reports directory found." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Propagate test result
        if: ${{ steps.run-tests.outcome == 'failure' }}
        shell: bash
        run: exit 1

      - name: Create artifact from integrations test reports
        if: ${{ always() }}
        uses: ./.github/actions/create-artifact
        with:
          artifact-name: ${{ matrix.artifact-name }}
          path-to-archive: "./integrations/agntcy-a2a/reports/*"

  run-tests-a2a-slimrpc:
    # A2A over SLIMRPC (Go + Python). Needs a running SLIM data-plane node, so we start
    # the pinned released slim image as a background container (GitHub `services:` cannot
    # pass the required `/slim --config ...` args, hence `docker run`).
    if: ${{ (github.event_name == 'workflow_dispatch' && !inputs.skip_slim_a2a_test) || (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.run-a2a-slimrpc == 'true') }}
    needs: [detect-changes]
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      packages: "read"

    env:
      # Pinned released SLIM node; keep in sync with integrations/agntcy-a2a-slimrpc/Taskfile.yml (SLIM_IMAGE).
      SLIM_IMAGE: "ghcr.io/agntcy/slim:1.4.0"
      SLIM_SERVER: "http://127.0.0.1:46357"
      # Test-only shared secret; must match the fixtures' default (not a real credential).
      SLIM_SHARED_SECRET: "my_shared_secret_for_testing_purposes_only"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start pinned SLIM node
        run: |
          docker run -d --name slim-node \
            -p 46357:46357 \
            -v "${{ github.workspace }}/integrations/agntcy-a2a-slimrpc/ci/slim-server-config.yaml:/config.yaml:ro" \
            "$SLIM_IMAGE" /slim --config /config.yaml

      - name: Wait for SLIM node to accept connections
        run: |
          for i in $(seq 1 30); do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/46357' >/dev/null 2>&1; then
              echo "SLIM node is accepting connections on :46357"
              exit 0
            fi
            sleep 1
          done
          echo "SLIM node did not open :46357 in time"
          docker logs slim-node || true
          exit 1

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python: true
          go: true
          # Go fixtures (slim-a2a-go) require the go line in fixtures/go/go.mod.
          go-version: "1.25.2"

      - name: Run A2A SLIMRPC interoperability tests
        run: task integrations:a2a-slimrpc:test
        shell: bash

      - name: SLIM node logs
        if: always()
        run: docker logs slim-node || true

      - name: Stop SLIM node
        if: always()
        run: docker rm -f slim-node || true

      - name: Create artifact from integrations test reports
        if: always()
        uses: ./.github/actions/create-artifact
        with:
          artifact-name: "a2a-slimrpc-test-result"
          path-to-archive: "./integrations/agntcy-a2a-slimrpc/reports/*"

  run-agentic-apps:
    if: ${{ inputs.run_agentic_apps_test }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python: true
          go: false

      - name: Run Agentic Apps
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          TEST_ENV_VAR: "anything"
        run: task integrations:apps:run-marketing-campaign
        shell: bash

  combine-all-artifacts:
    # Ensure this job runs only after all jobs that produce artifacts have completed
    needs:
      [
        run-tests-slim-topology,
        run-tests-directory-conformance,
        run-tests-a2a,
        run-tests-a2a-slimrpc,
      ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (required for local actions)
        if: ${{ contains(join(needs.*.result, ','), 'success')}}
        uses: actions/checkout@v4

      - name: Combine and upload all artifacts
        if: ${{ contains(join(needs.*.result, ','), 'success')}}
        uses: ./.github/actions/collect-reports
        with:
          combined-artifact-name: "combined-test-reports"

      - name: Generate test summary
        if: ${{ always() }}
        shell: bash
        run: |
          echo "## Integration Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          status_icon() {
            case "$1" in
              success)   echo "✅ success" ;;
              failure)   echo "❌ failure" ;;
              skipped)   echo "⏭️ skipped" ;;
              cancelled) echo "🚫 cancelled" ;;
              *)         echo "⚪ not run" ;;
            esac
          }

          emit_section() {
            local title="$1" status="$2" pattern="$3"
            echo "### $title — $(status_icon "$status")" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            local artifacts_dir="downloaded-individual-artifacts"
            if [[ -d "$artifacts_dir" ]]; then
              mapfile -t xmls < <(find "$artifacts_dir" -name "*.xml" 2>/dev/null | grep -E "$pattern" | sort)
              if [[ ${#xmls[@]} -gt 0 ]]; then
                local section_passed=0 section_failures=0 section_errors=0 section_skipped=0
                echo "| Report | Passed | Failed | Errors | Skipped | Time |" >> "$GITHUB_STEP_SUMMARY"
                echo "|--------|--------|--------|--------|---------|------|" >> "$GITHUB_STEP_SUMMARY"
                for xml in "${xmls[@]}"; do
                  name=$(basename "$xml" .xml)
                  tests=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo "0")
                  failures=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo "0")
                  errors=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo "0")
                  skipped=$(grep -c '<skipped' "$xml" || echo "0")
                  time=$(grep -oP 'time="\K[0-9.]+' "$xml" | head -1 || echo "0")
                  passed=$((tests - failures - errors - skipped))
                  echo "| $name | $passed | $failures | $errors | $skipped | ${time}s |" >> "$GITHUB_STEP_SUMMARY"
                  section_passed=$((section_passed + passed))
                  section_failures=$((section_failures + failures))
                  section_errors=$((section_errors + errors))
                  section_skipped=$((section_skipped + skipped))
                done
                echo "| **Total** | **$section_passed** | **$section_failures** | **$section_errors** | **$section_skipped** | |" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"

                # Print failed test details
                local all_failures=""
                for xml in "${xmls[@]}"; do
                  while IFS= read -r line; do
                    [[ -n "$line" ]] && all_failures+="$line"$'\n'
                  done < <(sed -n '/<testcase/,/<\/testcase>/p' "$xml" | awk '
                    /<testcase/ { name=""; match($0, /name="([^"]*)"/, m); name=m[1] }
                    /<failure/ {
                      match($0, /message="([^"]*)"/, m)
                      msg = m[1]
                      sub(/&#10;.*/, "", msg)
                      sub(/\\n.*/, "", msg)
                      if (length(msg) > 300) msg = substr(msg, 1, 300) "..."
                      print "- **" name "**: `" msg "`"
                    }
                  ')
                done
                if [[ -n "$all_failures" ]]; then
                  echo "<details><summary>❌ Failed tests</summary>" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "$all_failures" >> "$GITHUB_STEP_SUMMARY"
                  echo "</details>" >> "$GITHUB_STEP_SUMMARY"
                fi
              fi
            fi
            echo "" >> "$GITHUB_STEP_SUMMARY"
          }

          emit_section "Slim / Topology" \
            "${{ needs.run-tests-slim-topology.result }}" \
            "report-slim-"

          emit_section "Directory / Conformance" \
            "${{ needs.run-tests-directory-conformance.result }}" \
            "report-agntcy-dir-conformance|report-.*conformance"

          emit_section "A2A / Interop" \
            "${{ needs.run-tests-a2a.result }}" \
            "report-agntcy-a2a-"
