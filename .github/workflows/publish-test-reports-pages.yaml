name: publish-test-reports-pages

on:
  workflow_run:
    workflows:
      - test-integrations
      - test-benchmarks-slim
    types:
      - completed
  workflow_dispatch:
    inputs:
      integrations_run_id:
        description: "Optional test-integrations run ID override"
        required: false
        type: string
      benchmark_run_id:
        description: "Optional test-benchmarks-slim run ID override"
        required: false
        type: string
      slim_repo_benchmark_run_id:
        description: "Optional agntcy/slim benchmark.yaml run ID for importing benchmark-results.csv"
        required: false
        type: string

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "test-report-pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion != 'cancelled' && github.event.workflow_run.head_branch == github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve source runs
        id: resolve
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          INPUT_INTEGRATIONS_RUN_ID: ${{ inputs.integrations_run_id || '' }}
          INPUT_BENCHMARK_RUN_ID: ${{ inputs.benchmark_run_id || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/resolve-pages-source-runs.sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache-dependency-path: |
            integrations/go.sum
            benchmarks/go.sum

      - name: Build Pages site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INTEGRATIONS_RUN_ID: ${{ steps.resolve.outputs.integrations-run-id }}
          DIRECTORY_CONFORMANCE_RUN_ID: ${{ steps.resolve.outputs.directory-conformance-run-id }}
          BENCHMARK_RUN_ID: ${{ steps.resolve.outputs.benchmark-run-id }}
          HAS_A2A: ${{ steps.resolve.outputs.has-a2a }}
          HAS_DIRECTORY_CONFORMANCE: ${{ steps.resolve.outputs.has-directory-conformance }}
          HAS_BENCHMARK_SMOKE: ${{ steps.resolve.outputs.has-benchmark-smoke }}
          HAS_BENCHMARK_CAPACITY: ${{ steps.resolve.outputs.has-benchmark-capacity }}
          HAS_BENCHMARK_BASIC: ${{ steps.resolve.outputs.has-benchmark-basic }}
          SLIM_REPO_BENCHMARK_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.slim_repo_benchmark_run_id || '' }}
          SLIM_REPO_ACTIONS_READ_TOKEN: ${{ secrets.SLIM_REPO_ACTIONS_READ_TOKEN }}
        run: bash .github/scripts/build-pages-site.sh

      - name: Deploy to GitHub Pages
        id: deploy
        uses: ./.github/actions/deploy-github-pages
