name: test-slim-integration

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      kind_version:
        description: "Kind version"
        required: false
        default: "0.24.0"
      override_slim_image_tag:
        description: "Override Slim image tag"
        required: false
        default: ""
      override_slim_chart_tag:
        description: "Override Slim chart tag"
        required: false
        default: ""

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.detect-suite.outputs.should-run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect-suite
        uses: ./.github/actions/detect-suite-changes
        with:
          suite: slim-integration

  set-kind-version:
    needs: detect
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      kind-version: ${{ steps.set-kind-version.outputs.kind-version }}
    steps:
      - name: Set KinD version
        id: set-kind-version
        env:
          KIND_VERSION: "0.24.0"
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == 'workflow_dispatch' ]; then
              KIND_VERSION="${{ inputs.kind_version }}"
          fi

          echo "Set KinD version to: $KIND_VERSION"
          echo "kind-version=$KIND_VERSION" >> "$GITHUB_OUTPUT"

  run-tests-slim-integration:
    needs: [detect, set-kind-version]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: read
      attestations: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python: true
          go: false

      - name: Setup K8S Tools
        uses: ./.github/actions/setup-k8s
        with:
          kind-version: ${{ needs.set-kind-version.outputs.kind-version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build slim bindings examples image (linux/amd64)
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --tag "ghcr.io/agntcy/slim/bindings-examples:local" \
            --file integrations/agntcy-slim/examples/Dockerfile \
            integrations/agntcy-slim/examples

      - name: Deploy Slim with Controller
        uses: ./.github/actions/deploy-components
        with:
          deploy-slim: "false"
          deploy-spire: "true"
          deploy-slim-topology: "true"
          slim-config: "spire"
          slim-image-tag: ${{ inputs.override_slim_image_tag }}
          slim-controller-image-tag: ${{ inputs.override_slim_image_tag }}
          slim-chart-tag: ${{ inputs.override_slim_chart_tag }}

      - name: Load slim bindings examples image into kind
        shell: bash
        run: |
          set -euo pipefail
          kind load docker-image "ghcr.io/agntcy/slim/bindings-examples:local" --name "agntcy-test"

      - name: Run slim topology test
        run: task integrations:slim:test:topology
        shell: bash

      - name: Create artifact from integrations test reports
        if: always()
        uses: ./.github/actions/create-artifact
        with:
          artifact-name: slim-integration-test-result
          path-to-archive: integrations/agntcy-slim/reports/

  publish-pages:
    needs: [run-tests-slim-integration]
    if: always() && github.ref == 'refs/heads/main' && needs.run-tests-slim-integration.result != 'skipped'
    runs-on: ubuntu-latest
    concurrency:
      group: test-report-pages
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/publish-test-reports-pages
        with:
          suite: slim-integration
          source-run-id: ${{ github.run_id }}
          source-run-conclusion: ${{ needs.run-tests-slim-integration.result }}
